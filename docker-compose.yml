services:
  postgres:
    image: postgres:17-alpine
    container_name: rail-watcher-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-railwatcher}
      POSTGRES_USER: ${POSTGRES_USER:-railwatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-railwatcher}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rail-watcher-redis
    profiles: ["redis"]
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rail-watcher-app
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres-data:
