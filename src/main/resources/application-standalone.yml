spring:
  config:
    activate:
      on-profile: standalone
  datasource:
    url: jdbc:h2:file:./.data/railwatcher;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: localhost
    port: 2525

management:
  health:
    redis:
      enabled: false
    mail:
      enabled: false

railway:
  redis:
    enabled: false
  provider:
    permits-per-minute: 6
